services:
  postgres:
    image: postgres:17-alpine
    container_name: closet-command-db
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: closet_command
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
